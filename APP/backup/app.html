<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FPT App Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="appstyle.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">FPT</div>
  <div class="sb-list" id="sbList"></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="search-box">
      <span style="color:#ccc;font-size:13px">🔍</span>
      <input type="text" id="searchInput" placeholder="Tìm kiếm ứng dụng...">
    </div>
    <div class="tspc"></div>
    <button class="tbtn">Thông báo</button>
    <button class="tbtn">Hỗ trợ</button>

    <!-- AUTH ZONE -->
    <!-- Chưa đăng nhập -->
    <button class="tbtn pri" id="btn-login">Đăng nhập</button>

    <!-- Đã đăng nhập -->
    <div class="app-user-wrap" id="app-user-wrap" style="display:none">
      <img src="" alt="avatar" class="app-avatar" id="app-avatar-img">
      <div class="app-user-dropdown" id="app-user-dropdown">
        <div class="aud-header">
          <img src="" alt="" class="aud-avatar" id="aud-avatar-img">
          <div>
            <div class="aud-name" id="aud-name">username</div>
            <div class="aud-email" id="aud-email">email</div>
          </div>
        </div>
        <div class="aud-divider"></div>
        <a href="#" class="aud-item" id="aud-change-avatar">
          <i class="fa-solid fa-image"></i> Đổi avatar
        </a>
        <a href="#" class="aud-item aud-logout" id="aud-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
        </a>
      </div>
    </div>
  </div>

  <div class="content-area">
    <!-- HOME -->
    <div class="view" id="v-home">
      <div style="padding:28px 32px 0">
        <div class="grid-title">Ứng dụng</div>
        <div class="app-grid" id="appGrid"></div>
      </div>
    </div>

    <!-- SECTIONS -->
    <div class="view hidden sr" id="v-sections">
      <div class="view-hdr">
        <button class="back-btn" id="btn-back-sec">← Quay lại</button>
        <div class="app-badge">
          <div class="ab-ico" id="vs-ico"></div>
          <div>
            <div class="ab-name" id="vs-name"></div>
            <div class="ab-sub" id="vs-sub"></div>
          </div>
        </div>
      </div>
      <div class="sec-body" id="secBody"></div>
    </div>

    <!-- DETAIL -->
    <div class="view hidden sr" id="v-detail">
      <div class="det-hdr">
        <button class="back-btn" id="btn-back-det">← Quay lại</button>
        <div class="det-info">
          <span class="det-ico" id="vd-ico"></span>
          <span class="det-name" id="vd-name"></span>
          <span class="det-chip" id="vd-chip"></span>
        </div>
      </div>
      <div class="det-body" id="detBody"></div>
    </div>
  </div>
</div>

<!-- POPUP CHỌN AVATAR -->
<div class="av-overlay" id="av-overlay">
  <div class="av-popup">
    <div class="av-popup-hdr">
      <span>Chọn Avatar</span>
      <button class="av-close" id="av-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="av-grid" id="av-grid"></div>
  </div>
</div>

<script src="app.js"></script>
<script src="app-auth.js"></script>
</body>
</html>
