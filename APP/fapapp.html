<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAP App — FPT Launcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--o:#F47920;--od:#D4611A;--ol:#fff3e8;--ob:#ffd4aa;}
body{font-family:"Be Vietnam Pro",sans-serif;height:100vh;display:flex;overflow:hidden;background:#f5f5f5;}

/* ── SIDEBAR ── */
.sidebar{width:76px;background:linear-gradient(180deg,#f47920,#c85a00);height:100vh;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;padding:14px 6px 12px;overflow-y:auto;z-index:20;
  box-shadow:3px 0 18px rgba(0,0,0,.15);}
.sidebar-logo{background:white;border-radius:8px;padding:3px 8px;font-size:13px;font-weight:800;
  color:var(--o);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.2);letter-spacing:.5px;}
.sb-list{width:100%;display:flex;flex-direction:column;gap:3px;}
.sb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;
  border-radius:10px;cursor:pointer;border:none;background:transparent;width:100%;transition:all .18s;}
.sb-btn:hover{background:rgba(255,255,255,.18);}
.sb-btn.active{background:rgba(255,255,255,.3);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.5);}
.sb-iw{width:42px;height:42px;border-radius:11px;background:white;display:flex;align-items:center;
  justify-content:center;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .18s;flex-shrink:0;}
.sb-btn:hover .sb-iw,.sb-btn.active .sb-iw{transform:scale(1.07);}
.sb-iw img{width:30px;height:30px;object-fit:contain;}
.sb-iw span{font-size:20px;}
.sb-lb{font-size:9px;font-weight:700;color:rgba(255,255,255,.9);text-align:center;line-height:1.2;
  max-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar::-webkit-scrollbar{width:0;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;background:#fafafa;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 28px;
  border-bottom:2px solid var(--o);background:white;flex-shrink:0;
  box-shadow:0 2px 8px rgba(244,121,32,.08);}
.search-box{display:flex;align-items:center;gap:8px;background:#f6f6f6;
  border:1.5px solid #e8e8e8;border-radius:9px;padding:7px 13px;width:240px;transition:all .2s;}
.search-box:focus-within{border-color:var(--o);background:white;box-shadow:0 0 0 3px rgba(244,121,32,.1);}
.search-box input{border:none;background:transparent;outline:none;font-family:inherit;font-size:13px;color:#333;width:100%;}
.search-box input::placeholder{color:#bbb;}
.tspc{flex:1;}
/* ── CONTENT AREA ── */
.content-area{flex:1;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  transition:opacity .28s,transform .28s;}
.view.hidden{opacity:0;pointer-events:none;}
.view.sl{transform:translateX(-36px);}
.view.sr{transform:translateX(36px);}

/* ── HOME GRID ── */
#v-home{overflow-y:auto;padding:28px 32px;}
#v-home::-webkit-scrollbar{width:5px;}
#v-home::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:3px;}
.grid-title{font-size:10.5px;font-weight:800;color:#c0c0c0;letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px;}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px;}
.g-item{display:flex;align-items:center;gap:15px;padding:18px 20px;border-radius:16px;cursor:pointer;
  transition:all .22s;border:1.5px solid #ebebeb;background:white;
  box-shadow:0 2px 10px rgba(0,0,0,.05);animation:fadeUp .4s ease both;}
.g-item:hover{border-color:var(--o);background:var(--ol);transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(244,121,32,.14);}
.g-ico{width:68px;height:68px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.12);flex-shrink:0;transition:transform .22s;}
.g-item:hover .g-ico{transform:scale(1.06);}
.g-ico img{width:52px;height:52px;object-fit:contain;}
.g-ico span{font-size:32px;}
.g-info{flex:1;min-width:0;}
.g-name{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:3px;}
.g-sub{font-size:11.5px;color:#999;line-height:1.4;margin-bottom:7px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.g-tag{background:var(--ol);border:1px solid var(--ob);border-radius:20px;
  padding:2px 9px;font-size:10.5px;font-weight:700;color:var(--o);}
.g-arr{font-size:18px;color:#ddd;flex-shrink:0;margin-left:auto;transition:color .2s;}
.g-item:hover .g-arr{color:var(--o);}

/* ── VIEW HEADER ── */
.view-hdr{display:flex;align-items:center;gap:14px;padding:14px 24px;
  border-bottom:1.5px solid #f0f0f0;background:white;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.04);}
.app-badge{display:flex;align-items:center;gap:11px;}
.ab-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.1);}
.ab-ico img{width:30px;height:30px;object-fit:contain;}
.ab-ico span{font-size:20px;}
.ab-name{font-size:16px;font-weight:800;color:#1a1a1a;}
.ab-sub{font-size:11.5px;color:#bbb;margin-top:1px;}

/* ── SECTION LIST ── */
.sec-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:9px;}
.sec-body::-webkit-scrollbar{width:5px;}
.sec-body::-webkit-scrollbar-thumb{background:#e8e8e8;border-radius:3px;}
.sec-row{display:flex;align-items:center;gap:13px;padding:15px 18px;background:white;
  border:1.5px solid #ebebeb;border-radius:13px;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fadeUp .3s ease both;}
.sec-row:hover{border-color:var(--o);background:var(--ol);transform:translateX(5px);
  box-shadow:0 4px 16px rgba(244,121,32,.12);}
.sr-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.sr-title{font-size:13.5px;font-weight:700;color:#222;}
.sr-prev{font-size:11.5px;color:#bbb;margin-top:2px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:360px;}
.sr-arr{font-size:15px;color:#ccc;flex-shrink:0;transition:all .2s;margin-left:auto;}
.sec-row:hover .sr-arr{color:var(--o);transform:translateX(3px);}

/* ── DETAIL ── */
.det-hdr{display:flex;align-items:center;gap:13px;padding:14px 24px;
  border-bottom:1.5px solid #f0f0f0;background:white;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.04);}
.det-info{flex:1;display:flex;align-items:center;gap:9px;}
.det-ico{font-size:24px;}
.det-name{font-size:15px;font-weight:800;color:#222;}
.det-chip{background:var(--ol);border:1.5px solid var(--ob);border-radius:20px;
  padding:2px 11px;font-size:10.5px;font-weight:700;color:var(--o);margin-left:6px;}
.det-body{flex:1;overflow-y:auto;padding:22px 28px;display:flex;flex-direction:column;gap:12px;}
.det-body::-webkit-scrollbar{width:5px;}
.det-body::-webkit-scrollbar-thumb{background:#e8e8e8;border-radius:3px;}

/* ── CONTENT BLOCKS ── */
.cblock{border:1.5px solid #ebebeb;border-radius:13px;overflow:hidden;background:white;
  box-shadow:0 2px 8px rgba(0,0,0,.05);animation:fadeUp .35s ease both;}
.cblock:hover{box-shadow:0 4px 16px rgba(244,121,32,.1);}
.cbhead{padding:13px 17px;background:linear-gradient(135deg,#fff9f5,#fff3e8);
  display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;transition:background .15s;}
.cbhead:hover{background:linear-gradient(135deg,#fff1e0,#ffe8cc);}
.cbdot{width:4px;height:17px;background:var(--o);border-radius:2px;flex-shrink:0;}
.cblabel{font-size:11.5px;font-weight:800;color:var(--o);text-transform:uppercase;letter-spacing:.07em;flex:1;}
.cbarr{font-size:12px;color:#ccc;transition:transform .25s,color .2s;flex-shrink:0;}
.cbhead:hover .cbarr,.cblock.open .cbarr{color:var(--o);}
.cblock.open .cbarr{transform:rotate(90deg);}
.cbbody{max-height:0;overflow:hidden;padding:0 17px;transition:max-height .35s ease,padding .28s ease;}
.cblock.open .cbbody{padding:15px 17px;max-height:9999px;}
.wbox{background:#fffbe6;border:1.5px solid #ffe082;border-radius:9px;padding:10px 14px;
  font-size:13px;color:#6d4c00;line-height:1.7;display:flex;gap:8px;margin:7px 0;animation:fadeUp .3s ease both;}
.ibox{background:#e3f2fd;border:1.5px solid #90caf9;border-radius:9px;padding:10px 14px;
  font-size:13px;color:#0d47a1;line-height:1.7;display:flex;gap:8px;margin:7px 0;animation:fadeUp .3s ease both;}
.tbox{font-size:13.5px;color:#333;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.tbox a{color:var(--o);text-decoration:underline;}
.blist{list-style:none;display:flex;flex-direction:column;gap:7px;}
.blist li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:#333;line-height:1.6;}
.bull{color:var(--o);font-weight:900;font-size:14px;flex-shrink:0;margin-top:2px;}
.nlist{list-style:none;display:flex;flex-direction:column;gap:7px;counter-reset:n;}
.nlist li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:#333;line-height:1.6;counter-increment:n;}
.nlist li::before{content:counter(n);background:var(--o);color:white;border-radius:50%;
  width:21px;height:21px;min-width:21px;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:800;margin-top:2px;}
.brow{display:flex;flex-wrap:wrap;gap:6px;}
.badge{background:var(--ol);border:1.5px solid var(--ob);border-radius:20px;
  padding:3px 12px;font-size:11.5px;font-weight:700;color:var(--o);}
.lrow{display:flex;flex-wrap:wrap;gap:8px;}
.lchip{display:flex;align-items:center;gap:6px;background:var(--ol);border:1.5px solid var(--o);
  border-radius:9px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--o);
  text-decoration:none;transition:all .2s;word-break:break-all;}
.lchip:hover{background:var(--o);color:white;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<aside class="sidebar">
  <div class="sidebar-logo">FPT</div>
  <div class="sb-list" id="sbList"></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="search-box">
      <span style="color:#ccc;font-size:13px">🔍</span>
      <input type="text" id="searchInput" placeholder="Tìm kiếm ứng dụng...">
    </div>
    <button onclick="window.location.href='../index.html'" style="background:none;border:0.5px solid #F9A82544;border-radius:8px;cursor:pointer;font-size:13px;color:#F9A825;padding:6px 12px;margin-right:4px;white-space:nowrap">⌂ FView</button><button onclick="window.location.href='HomeApp.html'" style="background:none;border:0.5px solid #F9A82544;border-radius:8px;cursor:pointer;font-size:13px;color:#F9A825;padding:6px 12px;margin-right:8px;white-space:nowrap">📱 Apps</button><div class="tspc"></div>

  </div>

  <div class="content-area">
    <!-- HOME -->
    <div class="view" id="v-home">
      <div style="padding:28px 32px 0">

        <div class="app-grid" id="appGrid"></div>
      </div>
    </div>

    <!-- SECTIONS -->
    <div class="view hidden sr" id="v-sections">
      <div class="view-hdr">
        <div class="app-badge">
          <div class="ab-ico" id="vs-ico"></div>
          <div>
            <div class="ab-name" id="vs-name"></div>
            <div class="ab-sub" id="vs-sub"></div>
          </div>
        </div>
      </div>
      <div class="sec-body" id="secBody"></div>
    </div>

    <!-- DETAIL -->
    <div class="view hidden sr" id="v-detail">
      <div class="det-hdr">
        <div class="det-info">
          <span class="det-ico" id="vd-ico"></span>
          <span class="det-name" id="vd-name"></span>
          <span class="det-chip" id="vd-chip"></span>
        </div>
      </div>
      <div class="det-body" id="detBody"></div>
    </div>
  </div>
</div>

var curApp=null, curView='home';



var curApp=null, curView='home';

/* ── NAV ── */
function goTo(view){
  var ord={home:0,sections:1,detail:2};
  var vm={home:'v-home',sections:'v-sections',detail:'v-detail'};
  var fwd=ord[view]>ord[curView];
  Object.keys(vm).forEach(function(v){
    var el=document.getElementById(vm[v]);
    el.classList.add('hidden');
    el.classList.remove('sl','sr');
  });
  var t=document.getElementById(vm[view]);
  t.classList.add(fwd?'sr':'sl');
  t.classList.remove('hidden');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){t.classList.remove('sl','sr');});
  });
  curView=view;
  document.querySelectorAll('.sb-btn').forEach(function(b){b.classList.remove('active');});
  if(curApp){var sb=document.getElementById('sb-'+curApp);if(sb)sb.classList.add('active');}
}

/* ── ICON HTML ── */
function icoHtml(app, size){
  if(app.icon_img){
    return '<img src="'+app.icon_img+'" style="width:'+(size*0.75)+'px;height:'+(size*0.75)+'px;object-fit:contain">';
  }
  return '<span style="font-size:'+(size*0.5)+'px">'+(app.emoji||'📱')+'</span>';
}

/* ── SIDEBAR ── */
function renderSidebar(){
  var el=document.getElementById('sbList');
  el.innerHTML='';
  APPS.forEach(function(a){
    var btn=document.createElement('button');
    btn.className='sb-btn';
    btn.id='sb-'+a.id;
    btn.innerHTML='<div class="sb-iw">'+icoHtml(a,42)+'</div>'
      +'<span class="sb-lb">'+a.name+'</span>';
    btn.addEventListener('click',function(){openApp(a.id);});
    el.appendChild(btn);
  });
}

/* ── GRID ── */
function renderGrid(filter){
  filter=filter||'';
  var list=APPS.filter(function(a){
    return a.name.toLowerCase().indexOf(filter.toLowerCase())>=0
        || a.sub.toLowerCase().indexOf(filter.toLowerCase())>=0;
  });
  var grid=document.getElementById('appGrid');
  grid.innerHTML='';
  list.forEach(function(a,i){
    var btn=document.createElement('button');
    btn.className='g-item';
    btn.style.animationDelay=(i*0.055)+'s';
    btn.innerHTML=
      '<div class="g-ico" style="background:'+a.bg+'">'+icoHtml(a,68)+'</div>'
      +'<div class="g-info">'
      +'<div class="g-name">'+a.name+'</div>'
      +'<div class="g-sub">'+a.sub+'</div>'
      +'<span class="g-tag">'+a.sections.length+' mục</span>'
      +'</div>'
      +'<span class="g-arr">›</span>';
    btn.addEventListener('click',function(){openApp(a.id);});
    grid.appendChild(btn);
  });
}

/* ── OPEN APP ── */
function openApp(id){
  curApp=id;
  var app=APPS.find(function(a){return a.id===id;});
  if(!app)return;
  document.getElementById('vs-ico').innerHTML='<div style="width:40px;height:40px;border-radius:10px;background:'+app.bg+';display:flex;align-items:center;justify-content:center;overflow:hidden">'+icoHtml(app,40)+'</div>';
  document.getElementById('vs-name').textContent=app.name;
  document.getElementById('vs-sub').textContent=app.sub;
  var sb=document.getElementById('secBody');
  sb.innerHTML='';
  app.sections.forEach(function(sec,i){
    var row=document.createElement('div');
    row.className='sec-row';
    row.style.animationDelay=(i*0.05)+'s';
    row.innerHTML='<span class="sr-ico">'+sec.icon+'</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="sr-title">'+sec.title+'</div>'
      +'<div class="sr-prev">'+sec.preview+'</div>'
      +'</div><span class="sr-arr">›</span>';
    row.addEventListener('click',(function(idx){return function(){openSection(idx);};})(i));
    sb.appendChild(row);
  });
  goTo('sections');
}

/* ── OPEN SECTION ── */
function openSection(idx){
  var app=APPS.find(function(a){return a.id===curApp;});
  var sec=app.sections[idx];
  document.getElementById('vd-ico').textContent=sec.icon;
  document.getElementById('vd-name').textContent=sec.title;
  document.getElementById('vd-chip').textContent=app.name;
  var db=document.getElementById('detBody');
  db.innerHTML=sec.blocks.map(function(b,i){return renderBlock(b,i);}).join('');
  if(sec.autoOpen){
    db.querySelectorAll('.cblock').forEach(function(el){
      el.classList.add('open');
      var body=el.querySelector('.cbbody');
      body.style.padding='15px 17px';
      body.style.maxHeight='none';
    });
  }
  goTo('detail');
}

/* ── TOGGLE BLOCK ── */
document.addEventListener('click',function(e){
  var head=e.target.closest('.cbhead');
  if(!head)return;
  var block=head.closest('.cblock');
  if(!block)return;
  var body=block.querySelector('.cbbody');
  if(block.classList.contains('open')){
    body.style.maxHeight=body.scrollHeight+'px';
    body.style.padding='15px 17px';
    requestAnimationFrame(function(){
      body.style.transition='max-height .32s ease,padding .28s ease';
      body.style.maxHeight='0';
      body.style.padding='0 17px';
    });
    block.classList.remove('open');
  } else {
    body.style.transition='max-height .38s ease,padding .28s ease';
    body.style.maxHeight=body.scrollHeight+'px';
    body.style.padding='15px 17px';
    block.classList.add('open');
    setTimeout(function(){if(block.classList.contains('open'))body.style.maxHeight='none';},400);
  }
});

/* ── RENDER BLOCK ── */
function renderBlock(b,i){
  var delay='animation-delay:'+(i*0.065)+'s';
  if(!b.label){
    if(b.type==='warn') return '<div class="wbox" style="'+delay+'"><span>⚠️</span><span>'+b.content+'</span></div>';
    if(b.type==='info') return '<div class="ibox" style="'+delay+'"><span>ℹ️</span><span>'+b.content+'</span></div>';
    return '';
  }
  var inner='';
  switch(b.type){
    case 'text':
      inner='<div class="tbox">'+b.content.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>')+'</div>';
      break;
    case 'bullets':
      inner='<ul class="blist">'+b.content.map(function(x){
        return '<li><span class="bull">›</span><span>'+x+'</span></li>';
      }).join('')+'</ul>';
      break;
    case 'steps':
      inner='<ol class="nlist">'+b.content.map(function(x){
        return '<li><span>'+x+'</span></li>';
      }).join('')+'</ol>';
      break;
    case 'badges':
      inner='<div class="brow">'+b.content.map(function(x){
        return '<span class="badge">'+x+'</span>';
      }).join('')+'</div>';
      break;
    case 'links':
      inner='<div class="lrow">'+b.content.map(function(l){
        return '<a class="lchip" href="'+l+'" target="_blank">🔗 '+l.replace(/^https?:\/\//,'')+'</a>';
      }).join('')+'</div>';
      break;
    case 'html':
      inner=b.content;
      break;
    default:
      inner='<div class="tbox">'+b.content+'</div>';
  }
  return '<div class="cblock" style="'+delay+'">'
    +'<div class="cbhead"><div class="cbdot"></div>'
    +'<div class="cblabel">'+b.label+'</div>'
    +'<span class="cbarr">›</span></div>'
    +'<div class="cbbody">'+inner+'</div></div>';
}
